<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harita Test v2</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0f1117; color:#e8eaf6; font-family:'Segoe UI',sans-serif; padding:12px; }
.log { border-radius:8px; padding:10px; margin-bottom:8px; font-size:11px; font-family:monospace; }
.ok  { background:#1a2a1a; border-left:3px solid #43e97b; }
.err { background:#2a1a1a; border-left:3px solid #ff6b6b; }
.warn{ background:#2a2a1a; border-left:3px solid #f9ca24; }

/* Animasyon testi — inline, class yok */
@keyframes hSis1 {
  0%,100%{ transform:translate(0,0) scale(1); }
  50%    { transform:translate(15%,10%) scale(1.15); }
}
</style>
</head>
<body>

<h3 style="margin-bottom:12px;font-size:1rem">🔍 Harita Debug v2</h3>
<div id="log"></div>

<!-- Sis demo — tamamen inline -->
<div style="margin:12px 0">
  <div style="font-size:11px;color:#8b90b8;margin-bottom:6px">Inline sis animasyon testi:</div>
  <div style="position:relative;width:120px;height:80px;margin:0 auto;background:#1a2a3a;border-radius:8px;overflow:hidden">
    <div style="position:absolute;width:100%;height:100%;border-radius:50%;
      background:radial-gradient(ellipse,rgba(10,14,35,.9) 0%,transparent 70%);
      animation:hSis1 3s ease-in-out infinite"></div>
    <div style="position:absolute;width:70%;height:70%;top:15%;left:15%;border-radius:50%;
      background:radial-gradient(ellipse,rgba(10,14,35,.7) 0%,transparent 70%);
      animation:hSis1 4s ease-in-out infinite 0.5s"></div>
  </div>
  <div style="font-size:10px;color:#8b90b8;text-align:center;margin-top:4px">Hareket ediyor mu?</div>
</div>

<script>
function log(msg, tip='ok') {
  document.getElementById('log').innerHTML +=
    `<div class="log ${tip}">${tip==='ok'?'✅':tip==='err'?'❌':'⚠️'} ${msg}</div>`;
}

// macera_harita.js'i yükle ve fonksiyonları test et
const s = document.createElement('script');
s.src = 'https://azizsengezer-byte.github.io/lgs-koc-takip/js/macera_harita.js';
s.onload = function() {
  log('macera_harita.js yüklendi');

  // HARITA_ADALAR var mı?
  if (typeof HARITA_ADALAR !== 'undefined') {
    log('HARITA_ADALAR tanımlı, ' + HARITA_ADALAR.length + ' ada var');
  } else {
    log('HARITA_ADALAR tanımsız!', 'err');
  }

  // maceraHarita fonksiyonu var mı?
  if (typeof maceraHarita === 'function') {
    log('maceraHarita() fonksiyonu mevcut');
  } else {
    log('maceraHarita() fonksiyonu YOK!', 'err');
    return;
  }

  // Sahte veri ile çalıştır
  window.studyEntries = [];
  window.currentUserData = { uid: 'test', name: 'Test' };
  window.kazanimlar = {
    'Matematik': ['Konu1','Konu2','Konu3'],
    'Fen Bilimleri': ['Konu1','Konu2'],
    'Türkçe': ['Konu1','Konu2'],
    'İngilizce': ['Konu1','Konu2'],
    'İnkılap Tarihi': ['Konu1','Konu2'],
    'Din Kültürü': ['Konu1','Konu2'],
  };
  window.getTodayKey = () => '2026-03-31';
  window.getDateKey = (d) => d.toISOString().split('T')[0];
  window._getW = () => ({ data: { days: {} } });

  try {
    const html = maceraHarita();
    log('maceraHarita() çalıştı, ' + html.length + ' karakter HTML üretildi');

    // sis div var mı?
    if (html.includes('hSis1')) {
      log('hSis1 animasyonu HTML içinde var ✓');
    } else {
      log('hSis1 animasyonu HTML içinde YOK — sis render edilmedi', 'err');
    }

    if (html.includes('radial-gradient')) {
      log('radial-gradient HTML içinde var ✓');
    } else {
      log('radial-gradient YOK', 'err');
    }

    // Ada sayısı
    const sisCount = (html.match(/hSis1/g)||[]).length;
    log('hSis1 referans sayısı: ' + sisCount + ' (6+ olmalı)');

    // Render et
    const div = document.createElement('div');
    div.innerHTML = html;
    document.body.appendChild(div);
    log('HTML sayfaya eklendi — aşağı kaydır, harita görünüyor mu?', 'warn');

  } catch(e) {
    log('maceraHarita() HATA: ' + e.message, 'err');
    log('Stack: ' + e.stack?.substring(0,200), 'err');
  }
};
s.onerror = function() {
  log('macera_harita.js yüklenemedi!', 'err');
};
document.head.appendChild(s);
</script>
</body>
</html>
