<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0f0830; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:sans-serif; }
#wrap { width:300px; height:300px; cursor:pointer; }
#status { color:#aaa; font-size:13px; margin-top:12px; text-align:center; padding:0 20px; }
</style>
</head>
<body>
<div id="wrap"></div>
<div id="status">Yükleniyor...</div>
<div style="color:rgba(255,255,255,0.3);font-size:11px;margin-top:8px">yumurtaya dokun</div>

<script src="https://unpkg.com/three@0.150.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.150.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
const wrap = document.getElementById('wrap');
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(300, 300);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
wrap.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
camera.position.set(0, 0.5, 3);

scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const dir = new THREE.DirectionalLight(0xffa0ff, 1.5);
dir.position.set(2, 4, 3);
scene.add(dir);
scene.add(new THREE.DirectionalLight(0x4cc9f0, 0.8)).position.set(-3,1,-2);

const loader = new THREE.GLTFLoader();
loader.load('egg.glb', (gltf) => {
  const model = gltf.scene;
  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const scale = 2.0 / Math.max(size.x, size.y, size.z);
  model.scale.setScalar(scale);
  model.position.sub(center.multiplyScalar(scale));
  scene.add(model);
  document.getElementById('status').textContent = '✅ Yüklendi! Dokun.';

  let shaking = false, shakePower = 0;
  wrap.addEventListener('click', () => {
    shaking = true; shakePower = 0.15;
    dir.intensity = 3;
    setTimeout(() => dir.intensity = 1.5, 200);
  });

  const clock = new THREE.Clock();
  (function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();
    model.rotation.y = Math.sin(t * 0.4) * 0.3;
    model.position.y = Math.sin(t * 1.2) * 0.04;
    if (shaking) {
      model.rotation.z = Math.sin(t * 25) * shakePower;
      shakePower *= 0.92;
      if (shakePower < 0.002) { shaking = false; model.rotation.z = 0; }
    }
    renderer.render(scene, camera);
  })();
}, (xhr) => {
  if (xhr.total) document.getElementById('status').textContent = `Yükleniyor... ${Math.round(xhr.loaded/xhr.total*100)}%`;
}, (err) => {
  document.getElementById('status').textContent = '❌ ' + (err.message||'Model yüklenemedi');
  console.error(err);
});
</script>
</body>
</html>
