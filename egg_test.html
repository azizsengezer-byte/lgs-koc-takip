<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0f0830; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:sans-serif; }
#wrap { width:300px; height:300px; cursor:pointer; }
#status { color:#aaa; font-size:13px; margin-top:12px; text-align:center; }
</style>
</head>
<body>
<div id="wrap"></div>
<div id="status">Yükleniyor...</div>
<div style="color:rgba(255,255,255,0.3);font-size:11px;margin-top:8px">yumurtaya dokun</div>

<script src="three.min.js"></script>
<script src="GLTFLoader.js"></script>
<script>
var wrap = document.getElementById('wrap');
var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(300, 300);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
wrap.appendChild(renderer.domElement);

var scene = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
camera.position.set(0, 0.5, 3);

scene.add(new THREE.AmbientLight(0xffffff, 0.7));
var dir = new THREE.DirectionalLight(0xffa0ff, 1.5);
dir.position.set(2, 4, 3);
scene.add(dir);
var rim = new THREE.DirectionalLight(0x4cc9f0, 0.8);
rim.position.set(-3, 1, -2);
scene.add(rim);

var loader = new THREE.GLTFLoader();
loader.load('egg.glb',
  function(gltf) {
    var model = gltf.scene;
    var box = new THREE.Box3().setFromObject(model);
    var center = box.getCenter(new THREE.Vector3());
    var size = box.getSize(new THREE.Vector3());
    var scale = 2.0 / Math.max(size.x, size.y, size.z);
    model.scale.setScalar(scale);
    model.position.sub(center.multiplyScalar(scale));
    scene.add(model);
    document.getElementById('status').textContent = '✅ Yüklendi! Dokun.';

    var shaking = false, shakePower = 0;
    wrap.addEventListener('click', function() {
      shaking = true; shakePower = 0.15;
      dir.intensity = 3;
      setTimeout(function() { dir.intensity = 1.5; }, 200);
    });

    var clock = new THREE.Clock();
    (function animate() {
      requestAnimationFrame(animate);
      var t = clock.getElapsedTime();
      model.rotation.y = Math.sin(t * 0.4) * 0.3;
      model.position.y = Math.sin(t * 1.2) * 0.04;
      if (shaking) {
        model.rotation.z = Math.sin(t * 25) * shakePower;
        shakePower *= 0.92;
        if (shakePower < 0.002) { shaking = false; model.rotation.z = 0; }
      }
      renderer.render(scene, camera);
    })();
  },
  function(xhr) {
    if (xhr.total) document.getElementById('status').textContent = 'Yükleniyor... ' + Math.round(xhr.loaded/xhr.total*100) + '%';
  },
  function(err) {
    document.getElementById('status').textContent = '❌ Model yüklenemedi';
    console.error(err);
  }
);
</script>
</body>
</html>
