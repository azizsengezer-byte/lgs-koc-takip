<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0f0830; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:sans-serif; color:white; }
#wrap { width:320px; height:320px; cursor:pointer; }
#status { font-size:12px; color:#aaa; margin-top:8px; text-align:center; }
#anim-list { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-top:10px; max-width:340px; }
.anim-btn { background:#6c63ff33; border:1px solid #6c63ff66; color:#ccc; border-radius:8px; padding:5px 12px; font-size:11px; cursor:pointer; }
.anim-btn.active { background:#6c63ff; color:#fff; }
</style>
</head>
<body>
<div id="wrap"></div>
<div id="status">Yükleniyor...</div>
<div id="anim-list"></div>
<div style="color:rgba(255,255,255,0.3);font-size:10px;margin-top:8px">modele dokun</div>

<script src="js/three.min.js"></script>
<script src="js/GLTFLoader.js"></script>
<script>
var wrap = document.getElementById('wrap');
var renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(320, 320);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
wrap.appendChild(renderer.domElement);

var scene = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
camera.position.set(0, 1, 4);

scene.add(new THREE.AmbientLight(0xffffff, 0.8));
var dir = new THREE.DirectionalLight(0xffffff, 1.2);
dir.position.set(3, 5, 3);
scene.add(dir);
scene.add(new THREE.DirectionalLight(0x4cc9f0, 0.5)).position.set(-3,2,-2);

var mixer, actions = {}, currentAction = null;
var clock = new THREE.Clock();

var loader = new THREE.GLTFLoader();
loader.load('dragon.glb',
  function(gltf) {
    var model = gltf.scene;

    // Merkeze hizala
    var box = new THREE.Box3().setFromObject(model);
    var center = box.getCenter(new THREE.Vector3());
    var size = box.getSize(new THREE.Vector3());
    var scale = 2.5 / Math.max(size.x, size.y, size.z);
    model.scale.setScalar(scale);
    model.position.sub(center.multiplyScalar(scale));
    model.position.y -= 0.5;
    scene.add(model);

    var animCount = gltf.animations ? gltf.animations.length : 0;
    document.getElementById('status').textContent = '✅ Yüklendi! ' + animCount + ' animasyon bulundu.';

    if (animCount > 0) {
      mixer = new THREE.AnimationMixer(model);
      var list = document.getElementById('anim-list');

      gltf.animations.forEach(function(clip, i) {
        var action = mixer.clipAction(clip);
        actions[clip.name] = action;

        var btn = document.createElement('button');
        btn.className = 'anim-btn';
        btn.textContent = clip.name || ('Anim ' + i);
        btn.onclick = function() {
          playAnim(clip.name);
          document.querySelectorAll('.anim-btn').forEach(function(b) { b.classList.remove('active'); });
          btn.classList.add('active');
        };
        list.appendChild(btn);
      });

      // İlk animasyonu oynat
      var firstName = gltf.animations[0].name;
      playAnim(firstName);
      list.children[0] && list.children[0].classList.add('active');
    }

    // Tıklayınca dans animasyonu
    wrap.addEventListener('click', function() {
      var dansAnim = Object.keys(actions).find(function(k) {
        return k.toLowerCase().includes('dance') || k.toLowerCase().includes('dans') || k.toLowerCase().includes('jump');
      });
      if (dansAnim) playAnim(dansAnim);
      dir.intensity = 2.5;
      setTimeout(function() { dir.intensity = 1.2; }, 300);
    });

    function animate() {
      requestAnimationFrame(animate);
      var delta = clock.getDelta();
      if (mixer) mixer.update(delta);
      model.rotation.y += 0.003;
      renderer.render(scene, camera);
    }
    animate();
  },
  function(xhr) {
    if (xhr.total) document.getElementById('status').textContent = 'Yükleniyor... ' + Math.round(xhr.loaded/xhr.total*100) + '%';
  },
  function(err) {
    document.getElementById('status').textContent = '❌ Hata: ' + (err.message||'model yüklenemedi');
    console.error(err);
  }
);

function playAnim(name) {
  if (!actions[name]) return;
  if (currentAction && currentAction !== actions[name]) {
    currentAction.fadeOut(0.3);
  }
  actions[name].reset().fadeIn(0.3).play();
  currentAction = actions[name];
}
</script>
</body>
</html>
