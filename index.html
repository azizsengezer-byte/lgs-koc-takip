<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LGS Koç Takip Sistemi</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --accent3: #43e97b;
    --accent4: #f9ca24;
    --text: #e8eaf6;
    --text2: #8b90b8;
    --turkish: #ff6b6b;
    --math: #4ecdc4;
    --science: #45b7d1;
    --history: #f9ca24;
    --religion: #a29bfe;
    --english: #fd79a8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

  /* LOGIN */
  #loginScreen {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background: radial-gradient(ellipse at 20% 50%, #1a1460 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, #2d1b69 0%, transparent 50%),
                var(--bg);
  }
  .login-box {
    background:var(--surface); border:1px solid var(--border); border-radius:24px;
    padding:48px 40px; width:100%; max-width:420px; text-align:center;
    box-shadow:0 32px 80px rgba(0,0,0,0.5);
  }
  .login-logo { font-family:'Sora',sans-serif; font-size:2.2rem; font-weight:700; margin-bottom:8px; }
  .login-logo span { color:var(--accent); }
  .login-sub { color:var(--text2); margin-bottom:36px; font-size:0.95rem; }
  .role-btns { display:flex; gap:12px; margin-bottom:28px; }
  .role-btn {
    flex:1; padding:14px; border-radius:14px; border:2px solid var(--border);
    background:transparent; color:var(--text2); font-family:'Nunito',sans-serif;
    font-size:0.95rem; font-weight:700; cursor:pointer; transition:all .2s;
  }
  .role-btn.active { border-color:var(--accent); background:rgba(108,99,255,.15); color:var(--accent); }
  .login-input {
    width:100%; padding:14px 18px; background:var(--surface2); border:1px solid var(--border);
    border-radius:12px; color:var(--text); font-family:'Nunito',sans-serif; font-size:1rem;
    margin-bottom:14px; outline:none; transition:border .2s;
  }
  .login-input:focus { border-color:var(--accent); }
  .login-btn {
    width:100%; padding:16px; background:var(--accent); border:none; border-radius:14px;
    color:#fff; font-family:'Nunito',sans-serif; font-size:1.05rem; font-weight:800;
    cursor:pointer; transition:all .2s; margin-top:4px;
  }
  .login-btn:hover { background:#5a52e0; transform:translateY(-1px); }

  /* MAIN APP */
  #app { display:none; }
  .app-header {
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:16px 24px; display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:100;
  }
  .header-logo { font-family:'Sora',sans-serif; font-weight:700; font-size:1.1rem; }
  .header-logo span { color:var(--accent); }
  .header-user { display:flex; align-items:center; gap:10px; }
  .avatar {
    width:36px; height:36px; border-radius:50%; background:var(--accent);
    display:flex; align-items:center; justify-content:center; font-weight:800; font-size:0.9rem;
  }
  .header-name { font-weight:700; font-size:0.9rem; }
  .header-role { font-size:0.75rem; color:var(--text2); }
  .logout-btn {
    background:transparent; border:1px solid var(--border); color:var(--text2);
    padding:6px 14px; border-radius:8px; cursor:pointer; font-family:'Nunito',sans-serif;
    font-size:0.8rem; transition:all .2s;
  }
  .logout-btn:hover { border-color:var(--accent2); color:var(--accent2); }

  .app-body { display:flex; min-height:calc(100vh - 69px); }

  /* SIDEBAR */
  .sidebar {
    width:220px; background:var(--surface); border-right:1px solid var(--border);
    padding:24px 12px; display:flex; flex-direction:column; gap:4px;
    position:sticky; top:69px; height:calc(100vh - 69px); overflow-y:auto;
  }
  .nav-item {
    display:flex; align-items:center; gap:10px; padding:11px 14px; border-radius:12px;
    color:var(--text2); cursor:pointer; transition:all .2s; font-weight:600; font-size:0.9rem;
    border:none; background:transparent; width:100%; text-align:left;
  }
  .nav-item:hover { background:var(--surface2); color:var(--text); }
  .nav-item.active { background:rgba(108,99,255,.18); color:var(--accent); }
  .nav-icon { font-size:1.1rem; width:20px; text-align:center; }
  .nav-section { font-size:0.7rem; color:var(--text2); padding:12px 14px 4px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; }

  /* CONTENT */
  .content { flex:1; padding:28px; overflow-y:auto; }

  /* PAGES */
  .page { display:none; }
  .page.active { display:block; }

  .page-title { font-family:'Sora',sans-serif; font-size:1.5rem; font-weight:700; margin-bottom:6px; }
  .page-sub { color:var(--text2); font-size:0.9rem; margin-bottom:28px; }

  /* CARDS */
  .card {
    background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:24px;
  }
  .card-title { font-weight:800; font-size:1rem; margin-bottom:16px; }

  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px; }
  .grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:20px; }
  .grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:20px; }

  /* STAT CARDS */
  .stat-card {
    background:var(--surface); border:1px solid var(--border); border-radius:16px;
    padding:20px; display:flex; flex-direction:column; gap:8px;
  }
  .stat-label { font-size:0.8rem; color:var(--text2); font-weight:600; }
  .stat-value { font-size:2rem; font-weight:900; font-family:'Sora',sans-serif; line-height:1; }
  .stat-change { font-size:0.8rem; font-weight:700; }
  .stat-change.up { color:var(--accent3); }
  .stat-change.down { color:var(--accent2); }

  /* SUBJECT BARS */
  .subject-row { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .subject-name { width:100px; font-size:0.85rem; font-weight:700; }
  .bar-bg { flex:1; background:var(--surface2); border-radius:99px; height:10px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:99px; transition:width 1s ease; }
  .subject-pct { width:40px; text-align:right; font-size:0.85rem; font-weight:700; color:var(--text2); }

  /* BUTTONS */
  .btn {
    padding:10px 20px; border-radius:10px; border:none; font-family:'Nunito',sans-serif;
    font-weight:700; font-size:0.9rem; cursor:pointer; transition:all .2s;
  }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:#5a52e0; transform:translateY(-1px); }
  .btn-outline { background:transparent; border:1px solid var(--border); color:var(--text2); }
  .btn-outline:hover { border-color:var(--accent); color:var(--accent); }
  .btn-success { background:var(--accent3); color:#000; }
  .btn-danger { background:var(--accent2); color:#fff; }

  /* FORM */
  .form-group { margin-bottom:16px; }
  .form-label { font-size:0.85rem; font-weight:700; color:var(--text2); margin-bottom:6px; display:block; }
  .form-input, .form-select {
    width:100%; padding:12px 16px; background:var(--surface2); border:1px solid var(--border);
    border-radius:10px; color:var(--text); font-family:'Nunito',sans-serif; font-size:0.95rem;
    outline:none; transition:border .2s;
  }
  .form-input:focus, .form-select:focus { border-color:var(--accent); }
  .form-select option { background:var(--surface2); }

  /* SUBJECT COLORS */
  .c-turkish { color:var(--turkish); }
  .c-math { color:var(--math); }
  .c-science { color:var(--science); }
  .c-history { color:var(--history); }
  .c-religion { color:var(--religion); }
  .c-english { color:var(--english); }
  .bg-turkish { background:var(--turkish); }
  .bg-math { background:var(--math); }
  .bg-science { background:var(--science); }
  .bg-history { background:var(--history); }
  .bg-religion { background:var(--religion); }
  .bg-english { background:var(--english); }

  /* SUBJECT CARD */
  .subject-entry-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:20px; }
  .subject-entry-card {
    background:var(--surface2); border:1px solid var(--border); border-radius:14px; padding:16px;
    cursor:pointer; transition:all .2s; position:relative; overflow:hidden;
  }
  .subject-entry-card:hover { border-color:var(--accent); transform:translateY(-2px); }
  .subject-entry-card.selected { border-color:var(--accent); background:rgba(108,99,255,.1); }
  .sec-name { font-weight:800; font-size:0.95rem; margin-bottom:4px; }
  .sec-dot { width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:6px; }

  /* NOTIFICATION */
  .notif-item {
    display:flex; gap:12px; align-items:flex-start; padding:14px;
    border-bottom:1px solid var(--border); transition:background .2s;
  }
  .notif-item:hover { background:var(--surface2); border-radius:10px; }
  .notif-dot { width:8px; height:8px; border-radius:50%; background:var(--accent); margin-top:5px; flex-shrink:0; }
  .notif-dot.read { background:var(--border); }
  .notif-text { font-size:0.88rem; line-height:1.5; }
  .notif-time { font-size:0.75rem; color:var(--text2); margin-top:3px; }

  /* STUDENT LIST */
  .student-row {
    display:flex; align-items:center; gap:14px; padding:14px 16px;
    border-bottom:1px solid var(--border); cursor:pointer; transition:background .2s; border-radius:10px;
  }
  .student-row:hover { background:var(--surface2); }
  .student-avatar { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:1rem; flex-shrink:0; }
  .student-info { flex:1; }
  .student-name { font-weight:700; font-size:0.95rem; }
  .student-meta { font-size:0.78rem; color:var(--text2); margin-top:2px; }
  .student-score { font-family:'Sora',sans-serif; font-weight:800; font-size:1.1rem; }
  .badge { padding:3px 10px; border-radius:99px; font-size:0.75rem; font-weight:700; }
  .badge-green { background:rgba(67,233,123,.15); color:var(--accent3); }
  .badge-yellow { background:rgba(249,202,36,.15); color:var(--accent4); }
  .badge-red { background:rgba(255,101,132,.15); color:var(--accent2); }

  /* CHART AREA */
  .chart-area { position:relative; height:200px; }
  .mini-chart { width:100%; height:100%; }

  /* WEEKLY GRID */
  .week-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
  .day-cell {
    aspect-ratio:1; border-radius:8px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; font-size:0.7rem; font-weight:700;
    border:1px solid var(--border); cursor:pointer; transition:all .2s;
  }
  .day-cell:hover { border-color:var(--accent); }
  .day-cell.has-data { background:rgba(108,99,255,.2); border-color:var(--accent); }
  .day-cell.today { border-color:var(--accent3); background:rgba(67,233,123,.1); }
  .day-name { font-size:0.65rem; color:var(--text2); margin-bottom:2px; }
  .day-num { font-size:0.9rem; font-weight:800; }
  .day-dot { width:4px; height:4px; border-radius:50%; background:var(--accent3); margin-top:2px; }

  /* ASSIGNMENT CARD */
  .assignment-card {
    background:var(--surface2); border:1px solid var(--border); border-radius:14px;
    padding:16px; margin-bottom:12px; display:flex; gap:14px; align-items:flex-start;
  }
  .assignment-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0; }
  .assignment-title { font-weight:800; font-size:0.95rem; margin-bottom:3px; }
  .assignment-desc { font-size:0.82rem; color:var(--text2); line-height:1.4; }
  .assignment-footer { display:flex; gap:8px; align-items:center; margin-top:8px; }

  /* PROGRESS RING */
  .progress-ring-wrap { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .progress-ring-label { font-size:0.78rem; color:var(--text2); font-weight:700; text-align:center; }

  /* TABS */
  .tabs { display:flex; gap:4px; background:var(--surface2); padding:4px; border-radius:12px; margin-bottom:20px; width:fit-content; }
  .tab { padding:8px 18px; border-radius:9px; font-weight:700; font-size:0.85rem; cursor:pointer; color:var(--text2); transition:all .2s; border:none; background:transparent; font-family:'Nunito',sans-serif; }
  .tab.active { background:var(--accent); color:#fff; }

  /* TOAST */
  #toast {
    position:fixed; bottom:24px; right:24px; background:var(--surface); border:1px solid var(--accent);
    border-radius:14px; padding:14px 20px; font-size:0.9rem; font-weight:700; z-index:9999;
    transform:translateY(100px); opacity:0; transition:all .3s; max-width:300px;
    box-shadow:0 8px 30px rgba(0,0,0,0.4);
  }
  #toast.show { transform:translateY(0); opacity:1; }
  #toast .toast-icon { font-size:1.1rem; margin-right:8px; }

  /* MODAL */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:500;
    display:none; align-items:center; justify-content:center; padding:20px;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background:var(--surface); border:1px solid var(--border); border-radius:20px;
    padding:28px; width:100%; max-width:480px; max-height:90vh; overflow-y:auto;
  }
  .modal-title { font-family:'Sora',sans-serif; font-weight:700; font-size:1.2rem; margin-bottom:20px; }
  .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; }

  /* MESSAGING */
  .chat-layout { display:grid; grid-template-columns:260px 1fr; gap:0; height:calc(100vh - 140px); min-height:400px; background:var(--surface); border:1px solid var(--border); border-radius:18px; overflow:hidden; }
  .chat-list { border-right:1px solid var(--border); overflow-y:auto; }
  .chat-list-header { padding:16px; border-bottom:1px solid var(--border); font-weight:800; font-size:0.95rem; }
  .chat-list-item { display:flex; align-items:center; gap:10px; padding:12px 16px; cursor:pointer; transition:background .2s; border-bottom:1px solid var(--border); }
  .chat-list-item:hover { background:var(--surface2); }
  .chat-list-item.active { background:rgba(108,99,255,.12); }
  .chat-list-item .unread { background:var(--accent); color:#fff; font-size:0.65rem; font-weight:800; width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin-left:auto; flex-shrink:0; }
  .chat-window { display:flex; flex-direction:column; }
  .chat-header { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; background:var(--surface); }
  .chat-messages { flex:1; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:10px; }
  .msg { max-width:72%; }
  .msg.mine { align-self:flex-end; }
  .msg.theirs { align-self:flex-start; }
  .msg-bubble { padding:10px 14px; border-radius:16px; font-size:0.88rem; line-height:1.5; }
  .msg.mine .msg-bubble { background:var(--accent); color:#fff; border-bottom-right-radius:4px; }
  .msg.theirs .msg-bubble { background:var(--surface2); color:var(--text); border-bottom-left-radius:4px; }
  .msg-time { font-size:0.7rem; color:var(--text2); margin-top:3px; text-align:right; }
  .msg.theirs .msg-time { text-align:left; }
  .chat-input-row { padding:12px 16px; border-top:1px solid var(--border); display:flex; gap:10px; align-items:center; }
  .chat-input { flex:1; padding:10px 14px; background:var(--surface2); border:1px solid var(--border); border-radius:20px; color:var(--text); font-family:'Nunito',sans-serif; font-size:0.9rem; outline:none; transition:border .2s; }
  .chat-input:focus { border-color:var(--accent); }
  .chat-send-btn { width:38px; height:38px; border-radius:50%; background:var(--accent); border:none; color:#fff; cursor:pointer; font-size:1.1rem; display:flex; align-items:center; justify-content:center; transition:all .2s; flex-shrink:0; }
  .chat-send-btn:hover { background:#5a52e0; transform:scale(1.08); }
  .msg-system { text-align:center; font-size:0.75rem; color:var(--text2); padding:4px 12px; background:var(--surface2); border-radius:99px; align-self:center; }
  @media(max-width:600px) { .chat-layout { grid-template-columns:1fr; } .chat-list { display:none; } .chat-list.mobile-show { display:block; } }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  /* PDF EXPORT */
  .pdf-btn {
    display:inline-flex; align-items:center; gap:8px;
    padding:10px 18px; border-radius:10px; border:none;
    font-family:'Nunito',sans-serif; font-weight:700; font-size:0.88rem;
    cursor:pointer; transition:all .2s; background:linear-gradient(135deg,#e84393,#c0392b);
    color:#fff;
  }
  .pdf-btn:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(232,67,147,.35); }
  .pdf-actions { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; align-items:center; }
  .pdf-period-select {
    padding:9px 14px; background:var(--surface2); border:1px solid var(--border);
    border-radius:10px; color:var(--text); font-family:'Nunito',sans-serif; font-size:0.88rem;
    font-weight:700; outline:none; cursor:pointer;
  }

  /* KAZANIM */
  .kazanim-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; }
  .kazanim-item {
    display:flex; align-items:center; gap:10px; padding:10px 14px;
    background:var(--surface2); border-radius:10px; border:1px solid var(--border);
    cursor:pointer; transition:all .2s; font-size:0.85rem; font-weight:600;
  }
  .kazanim-item:hover { border-color:var(--accent); }
  .kazanim-item.done { background:rgba(67,233,123,.08); border-color:rgba(67,233,123,.3); }
  .kazanim-check { width:18px; height:18px; border-radius:5px; border:2px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:0.75rem; transition:all .2s; }
  .kazanim-item.done .kazanim-check { background:var(--accent3); border-color:var(--accent3); color:#000; }

  /* MESAJLAŞMA */
  .msg-layout { display:grid; grid-template-columns:260px 1fr; gap:0; height:calc(100vh - 130px); background:var(--surface); border:1px solid var(--border); border-radius:18px; overflow:hidden; }
  .msg-list { border-right:1px solid var(--border); overflow-y:auto; }
  .msg-list-header { padding:16px; border-bottom:1px solid var(--border); font-weight:800; font-size:0.95rem; display:flex; align-items:center; justify-content:space-between; }
  .msg-contact { display:flex; align-items:center; gap:10px; padding:12px 16px; cursor:pointer; transition:background .2s; border-bottom:1px solid var(--border)05; }
  .msg-contact:hover { background:var(--surface2); }
  .msg-contact.active { background:rgba(108,99,255,.12); border-left:3px solid var(--accent); }
  .msg-contact-info { flex:1; min-width:0; }
  .msg-contact-name { font-weight:700; font-size:0.9rem; }
  .msg-contact-preview { font-size:0.75rem; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
  .msg-contact-time { font-size:0.7rem; color:var(--text2); flex-shrink:0; }
  .msg-unread { background:var(--accent); color:#fff; border-radius:99px; font-size:0.65rem; font-weight:800; padding:2px 6px; min-width:18px; text-align:center; }

  .msg-chat { display:flex; flex-direction:column; height:100%; }
  .msg-chat-header { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; flex-shrink:0; }
  .msg-chat-name { font-weight:800; font-size:1rem; }
  .msg-chat-status { font-size:0.75rem; color:var(--accent3); }
  .msg-chat-actions { margin-left:auto; display:flex; gap:8px; }

  .msg-body { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
  .msg-bubble-wrap { display:flex; gap:8px; align-items:flex-end; }
  .msg-bubble-wrap.mine { flex-direction:row-reverse; }
  .msg-bubble { max-width:70%; padding:10px 14px; border-radius:16px; font-size:0.88rem; line-height:1.5; }
  .msg-bubble.theirs { background:var(--surface2); border-bottom-left-radius:4px; }

  errEl.style.display = 'none';
  if (!email || !pass) { errEl.textContent = 'E-posta ve şifre giriniz.'; errEl.style.display='block'; return; }
  btn.textContent = 'Giriş yapılıyor...'; btn.disabled = true;
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(e) {
    btn.textContent = 'Giriş Yap →'; btn.disabled = false;
    const msgs = {
      'auth/user-not-found': 'Bu e-posta ile kayıtlı hesap bulunamadı.',
      'auth/wrong-password': 'Şifre yanlış, tekrar deneyin.',
      'auth/invalid-email': 'Geçersiz e-posta adresi.',
      'auth/invalid-credential': 'E-posta veya şifre hatalı.',
    };
    errEl.textContent = msgs[e.code] || 'Giriş başarısız: ' + e.message;
    errEl.style.display = 'block';
  }
}

async function doRegister() {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass = document.getElementById('regPass').value;
  const role = document.getElementById('regRole').value;
  const errEl = document.getElementById('regError');
  errEl.style.display = 'none';
  if (!name || !email || !pass) { errEl.textContent = 'Tüm alanları doldurunuz.'; errEl.style.display='block'; return; }
  if (pass.length < 6) { errEl.textContent = 'Şifre en az 6 karakter olmalı.'; errEl.style.display='block'; return; }
  const branch = role==='teacher' ? (document.getElementById('regBranch').value || '') : '';
  const school = role==='teacher' ? (document.getElementById('regSchool').value.trim() || '') : '';
  const classroom = role==='student' ? (document.getElementById('regClass').value || '') : '';
  if (role==='teacher' && !school) { errEl.textContent = 'Okul adı giriniz.'; errEl.style.display='block'; return; }
  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    await db.collection('users').doc(cred.user.uid).set({ name, email, role, branch, school, classroom, photo:'', createdAt: new Date() });
    closeModal('registerModal');
    showToast('🎉', `Hoş geldin ${name}! Hesabın oluşturuldu.`);
  } catch(e) {
    const msgs = {
      'auth/email-already-in-use': 'Bu e-posta zaten kayıtlı.',
      'auth/invalid-email': 'Geçersiz e-posta adresi.',
      'auth/weak-password': 'Şifre çok zayıf.',
    };
    errEl.textContent = msgs[e.code] || 'Kayıt başarısız: ' + e.message;
    errEl.style.display = 'block';
  }
}

function toggleRegFields() {
  const role = document.getElementById('regRole').value;
  document.getElementById('teacherFields').style.display = role==='teacher' ? 'block' : 'none';
  document.getElementById('studentFields').style.display = role==='student' ? 'block' : 'none';
}

async function saveClassSetup() {
  const cls = document.getElementById('setupClass').value;
  const user = auth.currentUser;
  if (user) {
    await db.collection('users').doc(user.uid).update({ classroom: cls });
    window.currentUserData = {...(window.currentUserData||{}), classroom: cls};
    closeModal('classSetupModal');
    const school = window.currentUserData.school || '';
    document.getElementById('headerRole').textContent = `${cls} • ${school}`;
    showToast('✅', `Sınıfın ${cls} olarak kaydedildi!`);
  }
}

let activeChat = 0;

let studentNotifs = [];

function messagesPage(role) {
  const isTeacher = role==='teacher';
  const conv = conversations[activeChat];

  const chatListHTML = conversations.map((c,i)=>`
    <div class="chat-list-item ${activeChat===i?'active':''}" onclick="switchChat(${i})">

      </div>
      ${c.unread>0?`<div class="unread">${c.unread}</div>`:''}
    </div>
  `).join('');

  const messagesHTML = conv.messages.map(m=>{
    const isMine = (isTeacher && m.from==='teacher') || (!isTeacher && m.from==='student');
    return `
      <div class="msg ${isMine?'mine':'theirs'}">
        <div class="msg-bubble">${m.text}</div>

      </div>
    `;
  }).join('');

  const headerName = isTeacher ? conv.name : document.getElementById('headerName').textContent;
  const headerColor = isTeacher ? conv.color : '#6c63ff';

  return `
    <div class="page-title">💬 Mesajlar</div>
    <div class="page-sub">Öğrencilerle birebir iletişim</div>
    <div class="chat-layout">
      <div class="chat-list">
        <div class="chat-list-header">💬 Konuşmalar</div>
        ${chatListHTML}
      </div>
      <div class="chat-window">
        <div class="chat-header">
          <div class="student-avatar" style="background:${headerColor}22;color:${headerColor};width:36px;height:36px;font-size:0.95rem">${headerName[0]}</div>
          <div>
            <div style="font-weight:800;font-size:0.95rem">${headerName}</div>

          </div>
        </div>
        <div class="chat-messages" id="chatMessages">
          <div class="msg-system">📅 Bugün</div>
          ${messagesHTML}
        </div>
        <div class="chat-input-row">
          <input class="chat-input" id="chatInput" type="text" placeholder="Mesaj yaz..." 
            onkeydown="if(event.key==='Enter')sendMessage('${role}')">
          <button class="chat-send-btn" onclick="sendMessage('${role}')">➤</button>
        </div>
      </div>
    </div>
  `;
}

function switchChat(idx) {
  activeChat = idx;
  conversations[idx].unread = 0;
  showPage('messages');
  setTimeout(()=>{
    const el = document.getElementById('chatMessages');
    if(el) el.scrollTop = el.scrollHeight;
  }, 80);
}

function sendMessage(role) {
  const input = document.getElementById('chatInput');
  const text = input?.value?.trim();
  if(!text) return;
  const from = role==='teacher' ? 'teacher' : 'student';
  const now = new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
  conversations[activeChat].messages.push({from, text, time:now});
  conversations[activeChat].lastMsg = text;
  input.value = '';

  // Re-render chat messages only
  const isMine = true;
  const msgEl = document.getElementById('chatMessages');
  if(msgEl) {
    const div = document.createElement('div');
    div.className = `msg mine`;
    div.innerHTML = `<div class="msg-bubble">${text}</div><div class="msg-time">${now}</div>`;
    msgEl.appendChild(div);
    msgEl.scrollTop = msgEl.scrollHeight;
  }

  // Simulate reply after 1.5s
  if(role==='teacher') {
    const replies = ['Tamam hocam, şimdi bakıyorum!','Anladım, teşekkürler 🙏','Hemen yapıyorum!','Peki hocam, anlıyorum.'];
    setTimeout(()=>{
      const reply = replies[Math.floor(Math.random()*replies.length)];
      const replyTime = new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
      conversations[activeChat].messages.push({from:'student',text:reply,time:replyTime});
      const msgEl2 = document.getElementById('chatMessages');
      if(msgEl2) {
        const div2 = document.createElement('div');
        div2.className = 'msg theirs';
        div2.innerHTML = `<div class="msg-bubble">${reply}</div><div class="msg-time">${replyTime}</div>`;
        msgEl2.appendChild(div2);
        msgEl2.scrollTop = msgEl2.scrollHeight;
        showToast('💬', `${conversations[activeChat].name}: "${reply}"`);
      }
    }, 1500);
  }
}

async function uploadPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 500000) { showToast('⚠️', 'Fotoğraf 500KB\'dan küçük olmalı!'); return; }
  const reader = new FileReader();
  reader.onload = async (e) => {
    const photoData = e.target.result;
    const user = auth.currentUser;
    if (user) {
      await db.collection('users').doc(user.uid).update({ photo: photoData });
      window.currentUserData = {...(window.currentUserData||{}), photo: photoData};
      document.getElementById('headerAvatar').style.backgroundImage = `url(${photoData})`;
      document.getElementById('headerAvatar').style.backgroundSize = 'cover';
      document.getElementById('headerAvatar').textContent = '';
      showToast('✅', 'Profil fotoğrafı güncellendi!');
      showPage('profile');
    }
  };
  reader.readAsDataURL(file);
}

async function saveProfile() {
  const name = document.getElementById('profileName').value.trim();
  const errEl = document.getElementById('profileError');
  errEl.style.display = 'none';
  if (!name) { errEl.textContent = 'İsim boş olamaz.'; errEl.style.display='block'; return; }
  const user = auth.currentUser;
  if (user) {
    const updates = { name };
    if (currentRole === 'teacher') {
      updates.branch = document.getElementById('profileBranch').value;
      updates.school = document.getElementById('profileSchool').value.trim();
    } else {
      updates.classroom = document.getElementById('profileClass').value;
    }
    await db.collection('users').doc(user.uid).update(updates);
    window.currentUserData = {...(window.currentUserData||{}), ...updates};
    document.getElementById('headerName').textContent = name;
    document.getElementById('headerAvatar').textContent = (window.currentUserData.photo) ? '' : name[0].toUpperCase();
    const roleLabel = currentRole==='teacher'
      ? `Koç Öğretmen${updates.branch?' • '+updates.branch:''}`
      : `${updates.classroom||''} • ${window.currentUserData.school||''}`;
    document.getElementById('headerRole').textContent = roleLabel;
    showToast('✅', 'Profil güncellendi!');
    showPage('profile');
  }
}

function selectSubjectCard(el, name) {

  el.classList.add('selected');
  document.getElementById('entrySubject').value = name;
  openModal('addEntryModal');
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function updateEntryTopics() {
  const sub = document.getElementById('entrySubject').value;
  const topics = kazanimlar[sub] || [];
  const sel = document.getElementById('entryTopic');
  sel.innerHTML = topics.map(t=>`<option>${t}</option>`).join('');
}

function openEntryFor(subjectName) {
  updateEntryTopics();
  if (subjectName) {
    document.getElementById('entrySubject').value = subjectName;
    updateEntryTopics();
  }
  // Reset fields
  document.getElementById('entryDuration').value = '';
  document.getElementById('entryQuestions').value = '';
  document.getElementById('entryCorrect').value = '';
  document.getElementById('entryWrong').value = '';
  document.getElementById('entryNote').value = '';
  openModal('addEntryModal');
}

function saveEntry() {
  const sub = document.getElementById('entrySubject').value;
  const topic = document.getElementById('entryTopic').value || 'Genel Çalışma';
  const type = document.getElementById('entryType').value;
  const dur = parseInt(document.getElementById('entryDuration').value) || 0;
  const q = parseInt(document.getElementById('entryQuestions').value) || 0;
  const correct = parseInt(document.getElementById('entryCorrect').value) || 0;
  const wrong = parseInt(document.getElementById('entryWrong').value) || 0;
  const note = document.getElementById('entryNote').value;
  if (!dur && !q) { showToast('⚠️', 'Süre veya soru sayısı giriniz!'); return; }

  const now = new Date();
  const time = now.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
  const dateKey = now.toISOString().split('T')[0];

  const entry = {
    subject: sub, topic, type, duration: dur, questions: q,
    correct, wrong, note, time, dateKey,
    isToday: true,
    date: 'Bugün ' + time,
    net: correct - (wrong/4),
  };
  studyEntries.unshift(entry);

  const user = auth.currentUser;
  if (user) {
    db.collection('studyEntries').add({
      ...entry, userId: user.uid,
      teacherId: (window.currentUserData||{}).teacherId || '',
      studentName: document.getElementById('headerName').textContent,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    }).catch(e => console.log('Firestore error:', e));
  }

  closeModal('addEntryModal');
  const netStr = q > 0 ? ` | Net: ${entry.net.toFixed(1)}` : '';
  showToast('✅', `${sub} — ${topic} kaydedildi!${netStr}`);
  showPage('daily-entry');
}

async function deleteStudent(i) {
  const s = students[i];
  if (!confirm(`${s.name} silinsin mi?`)) return;
  students.splice(i, 1);
  // Firestore'dan da sil
  const user = auth.currentUser;
  if (user) {
    const snap = await db.collection('pendingStudents')
      .where('teacherId','==',user.uid)
      .where('name','==',s.name).get();
    snap.forEach(doc => doc.ref.delete());
  }
  showToast('🗑️', `${s.name} silindi.`);
  showPage('students');
}

async function saveNewStudent() {
  const name = document.getElementById('newStudentName').value.trim();
  const email = document.getElementById('newStudentEmail').value.trim();
  const pass = document.getElementById('newStudentPass').value;
  const errEl = document.getElementById('addStudentError');

  if (students.length >= 6) { errEl.textContent = 'En fazla 6 öğrenci eklenebilir.'; errEl.style.display='block'; return; }

  const errBtn = document.querySelector('#addStudentModal .btn-primary');
  if (errBtn) { errBtn.textContent = 'Ekleniyor...'; errBtn.disabled = true; }

  try {
    const teacherUser = auth.currentUser;
    const teacherData = window.currentUserData || {};

    // İkinci bir Firebase App instance'ı oluşturarak öğrenci hesabı açıyoruz
    // Bu sayede öğretmenin oturumu kapanmıyor
    let secondaryApp;
    try {
      secondaryApp = firebase.app('secondary');
    } catch(e) {
      secondaryApp = firebase.initializeApp(firebase.app().options, 'secondary');
    }
    const secondaryAuth = secondaryApp.auth();

    // Öğrenci Firebase Auth hesabı oluştur
    const cred = await secondaryAuth.createUserWithEmailAndPassword(email, pass);
    const studentUid = cred.user.uid;

    // Öğrenci Firestore profilini kaydet
    const colors = ['#6c63ff','#ff6584','#43e97b','#f9ca24','#00b4d8','#ff9f43'];
    const color = colors[students.length % colors.length];
    await db.collection('users').doc(studentUid).set({
      name, email, role: 'student',
      teacherId: teacherUser.uid,
      school: teacherData.school || '',
      photo: '', color, avg: 0,
      createdAt: new Date()
    });

    // İkinci oturumu kapat (öğretmen oturumu etkilenmez)
    await secondaryAuth.signOut();

    // Öğretmenin listesine ekle
    students.push({ name, uid: studentUid, avg: 0, trend: 'up', lastActive: 'Yeni', color, tasks: 0 });

    closeModal('addStudentModal');
    document.getElementById('newStudentName').value = '';
    document.getElementById('newStudentEmail').value = '';
    document.getElementById('newStudentPass').value = '';
    showToast('✅', `${name} eklendi! Giriş: ${email} / ${pass}`);
    showPage('students');

  } catch(e) {
    const msgs = {
      'auth/email-already-in-use': 'Bu e-posta zaten kayıtlı.',
      'auth/invalid-email': 'Geçersiz e-posta adresi.',
      'auth/weak-password': 'Şifre çok zayıf, en az 6 karakter olmalı.',
    };
    errEl.textContent = msgs[e.code] || 'Hata: ' + e.message;
    errEl.style.display = 'block';
  } finally {
    if (errBtn) { errBtn.textContent = 'Ekle ✓'; errBtn.disabled = false; }
  }
}

function populateTaskStudents() {
  const sel = document.getElementById('taskStudent');
  sel.innerHTML = '<option value="">-- Öğrenci Seç --</option>';
  students.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.name;
    opt.textContent = s.name;
    sel.appendChild(opt);
  });
  if (students.length === 0) {
    sel.innerHTML = '<option value="">Henüz öğrenci eklenmedi</option>';
  }
  updateTaskUnits();
}

function updateTaskUnits() {
  const sub = document.getElementById('taskSubject').value;
  const units = kazanimlar[sub] || [];
  const sel = document.getElementById('taskUnit');
  sel.innerHTML = units.map(u => `<option>${u}</option>`).join('');
  updateTaskTitle();
}

function updateTaskTitle() {
  const type = document.getElementById('taskType').value;
  const unit = document.getElementById('taskUnit')?.value || '';
  const countGroup = document.getElementById('taskCountGroup');
  const titleEl = document.getElementById('taskTitle');
  const typeLabels = {
    soru: 'Soru Çözümü', konu: 'Konu Çalışma', test: 'Test Çözme',
    ozet: 'Özet Çıkarma', tekrar: 'Tekrar', diger: 'Görev'
  };
  countGroup.style.display = (type === 'soru' || type === 'test') ? 'block' : 'none';
  if (unit) titleEl.value = `${unit} — ${typeLabels[type]||'Görev'}`;
}

function openTaskModal() {
  populateTaskStudents();
  // Varsayılan tarihi bugünden 3 gün sonraya ayarla
  const d = new Date();
  d.setDate(d.getDate() + 3);
  document.getElementById('taskDue').value = d.toISOString().split('T')[0];
  openModal('addTaskModal');
}

function saveTask() {
  const student = document.getElementById('taskStudent').value;
  if (!student) { showToast('⚠️', 'Lütfen öğrenci seçin!'); return; }
  const title = document.getElementById('taskTitle').value || 'Yeni Görev';
  const sub = document.getElementById('taskSubject').value;
  const unit = document.getElementById('taskUnit').value;
  const type = document.getElementById('taskType').value;
  const count = document.getElementById('taskCount').value;
  const desc = document.getElementById('taskDesc').value || `${unit} konusunda görev`;
  const dueRaw = document.getElementById('taskDue').value;
  const due = dueRaw ? new Date(dueRaw).toLocaleDateString('tr-TR',{day:'numeric',month:'short'}) : '—';
  const typeLabels = {soru:'📝 Soru Çözümü', konu:'📖 Konu Çalışma', test:'📊 Test', ozet:'✏️ Özet', tekrar:'🔁 Tekrar', diger:'📌 Diğer'};
  const fullDesc = (count ? `${count} soru — ` : '') + desc;
  tasks.unshift({ title, subject:sub, unit, type, typeLabel:typeLabels[type]||'Görev', desc:fullDesc, due, student, done:false });
  closeModal('addTaskModal');
  document.getElementById('taskTitle').value = '';
  document.getElementById('taskDesc').value = '';
  document.getElementById('taskCount').value = '';
  showToast('📤', `${student}'e görev gönderildi!`);
  showPage('tasks-teacher');
}

function completeTask(i) {
  tasks[i].done = true;
  showToast('🎉', 'Görev tamamlandı olarak işaretlendi!');
  showPage('my-tasks');
}

function toggleKazanim(subject, idx, el) {
  const key = subject+idx;
  kazanimDone[key] = !kazanimDone[key];
  el.classList.toggle('done', kazanimDone[key]);
  el.querySelector('.kazanim-check').textContent = kazanimDone[key] ? '✓' : '';
  // update progress bar
  const kList = kazanimlar[subject] || [];
  const done = kList.filter((_,i)=> kazanimDone[subject+i]).length;
  const pct = kList.length ? Math.round(done/kList.length*100) : 0;
  showToast(kazanimDone[key]?'✅':'↩️', `${subject} — ${kList[idx]} ${kazanimDone[key]?'tamamlandı':'geri alındı'}`);
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

}

function drawLineChart(ctx, w, h, data, color) {
  const c = ctx.canvas; c.width = c.offsetWidth || 400;
  const cw = c.width, ch = h;
  ctx.clearRect(0,0,cw,ch);
  const max = Math.max(...data), min = 0;
  const pad = 20;
  const xStep = (cw-pad*2)/(data.length-1);

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  for(let i=0;i<4;i++) {
    const y = pad + (ch-pad*2)*i/3;
    ctx.beginPath(); ctx.moveTo(pad,y); ctx.lineTo(cw-pad,y); ctx.stroke();
  }

  // Fill
  const gradient = ctx.createLinearGradient(0,0,0,ch);
  gradient.addColorStop(0, color+'44');
  gradient.addColorStop(1, color+'00');
  ctx.beginPath();
  data.forEach((v,i)=>{
    const x = pad+i*xStep, y = ch-pad-(v/max)*(ch-pad*2);
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.lineTo(pad+(data.length-1)*xStep, ch-pad);
  ctx.lineTo(pad, ch-pad);
  ctx.closePath();
  ctx.fillStyle = gradient;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.strokeStyle = color; ctx.lineWidth = 2.5;
  data.forEach((v,i)=>{
    const x = pad+i*xStep, y = ch-pad-(v/max)*(ch-pad*2);
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.stroke();

  // Dots
  data.forEach((v,i)=>{
    if(v===0) return;
    const x = pad+i*xStep, y = ch-pad-(v/max)*(ch-pad*2);
    ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle = color; ctx.fill();
    ctx.beginPath(); ctx.arc(x,y,2,0,Math.PI*2);
    ctx.fillStyle = '#fff'; ctx.fill();
  });

  // Labels
  ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = '10px Nunito'; ctx.textAlign='center';
  ['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'].forEach((d,i)=>{
    ctx.fillText(d, pad+i*xStep, ch-4);
  });
}

function drawBarChart(ctx, w, h, labels, data) {
  const c = ctx.canvas; c.width = c.offsetWidth || 400;
  const cw = c.width, ch = h;
  ctx.clearRect(0,0,cw,ch);
  const max = 100;
  const barColors = ['#6c63ff','#ff6584','#43e97b','#f9ca24'];
  const pad = 30, barW = (cw-pad*2)/data.length*0.5;
  const xStep = (cw-pad*2)/data.length;

  data.forEach((v,i)=>{
    const x = pad+i*xStep+xStep*0.25;
    const barH = (v/max)*(ch-pad*2);
    const y = ch-pad-barH;
    const r = ctx.createLinearGradient(0,y,0,ch-pad);
    r.addColorStop(0,barColors[i]); r.addColorStop(1,barColors[i]+'66');
    ctx.fillStyle = r;
    ctx.beginPath();
    ctx.roundRect(x,y,barW,barH,6);
    ctx.fill();
    ctx.fillStyle = barColors[i]; ctx.font='bold 12px Nunito'; ctx.textAlign='center';
    ctx.fillText(v, x+barW/2, y-6);
    ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font='10px Nunito';
    ctx.fillText(labels[i], x+barW/2, ch-10);
  });
}

window.addEventListener('resize', ()=>{ document.querySelectorAll('canvas').forEach(c=>c._drawn=false); drawCharts(); });
</script>
</body>
