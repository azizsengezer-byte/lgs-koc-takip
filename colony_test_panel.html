<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koloni Görsel Test Paneli</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');
:root {
  --bg: #0c0e14; --surface: #161922; --surface2: #1e2230; --border: #2a2e3e;
  --text: #e4e6eb; --text2: #8891a5; --accent: #6c63ff; --accent2: #ff6584; --accent3: #43e97b;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Nunito',system-ui,sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent}
.layout{display:flex;flex-direction:column;max-width:540px;margin:0 auto;min-height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:50}
.hdr h1{font-size:16px;font-weight:800;display:flex;align-items:center;gap:8px}
.hdr h1 span{color:var(--accent)}
.lvl-badge{font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;background:rgba(108,99,255,.15);color:var(--accent);border:1px solid rgba(108,99,255,.3)}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:53px;z-index:40}
.tab{flex:1;padding:11px 6px;background:none;border:none;border-bottom:2.5px solid transparent;color:var(--text2);font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:.2s;white-space:nowrap}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);background:rgba(108,99,255,.05)}
.pane{padding:14px 16px;flex:1;overflow-y:auto;display:none}
.pane.on{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.card-t{font-size:13px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.row{margin-bottom:12px}.row:last-child{margin-bottom:0}
.lbl{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:5px}
.val{font-weight:800;color:var(--accent);font-size:13px}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:var(--surface2);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg);box-shadow:0 0 8px rgba(108,99,255,.4)}
.btns{display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:9px 14px;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:12px;font-family:'Nunito',sans-serif;transition:transform .1s;flex:1;min-width:0}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--accent);color:#fff}
.btn-s{background:var(--accent3);color:#000}
.btn-d{background:var(--accent2);color:#fff}
.btn-o{background:transparent;border:1.5px solid var(--border);color:var(--text)}
.info-r{display:flex;align-items:center;justify-content:space-between;font-size:12px;padding:7px 0;border-bottom:1px solid var(--border)}
.info-r:last-child{border-bottom:none}
.info-r .l{color:var(--text2)}.info-r .v{font-weight:700;text-align:right;max-width:60%}
.mg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.mc{padding:12px;background:var(--surface2);border-radius:10px;text-align:center;border:1.5px solid transparent;transition:.2s}
.mc.act{border-color:var(--accent3)}.mc.bld{border-color:var(--accent);border-style:dashed}.mc.lck{opacity:.3}
.mc .n{font-size:12px;font-weight:800;margin-bottom:3px}.mc .s{font-size:10px;color:var(--text2)}
.chi{padding:12px;background:var(--surface2);border-radius:10px;margin-bottom:6px;cursor:pointer;border-left:3px solid var(--accent);transition:.15s}
.chi:active{background:var(--border)}.chi.lk{opacity:.35;border-left-color:var(--border)}
.chi .meta{font-size:10px;color:var(--text2);margin-bottom:2px}
.chi .tit{font-size:13px;font-weight:800}
.chi .txt{max-height:0;overflow:hidden;transition:max-height .3s ease}
.chi .txt-in{font-size:12px;color:var(--text2);line-height:1.7;padding-top:8px}
.xr{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:11px}
.xr.cur{background:rgba(108,99,255,.1);margin:0 -8px;padding:8px;border-radius:8px}
.xr .xl{font-weight:800;min-width:32px;color:var(--accent)}.xr .xi{flex:1}
.xr .xx{font-weight:700;color:var(--text)}.xr .xu{font-size:10px;color:var(--accent3);margin-top:2px}
.tg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.tc{padding:8px 4px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;text-align:center;cursor:pointer;font-size:11px;font-weight:700;color:var(--text);transition:.2s;font-family:'Nunito',sans-serif}
.tc.on{border-color:var(--accent);background:rgba(108,99,255,.1)}
.tgl{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);margin-top:6px}
.tgl input{accent-color:var(--accent);width:16px;height:16px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--accent);color:var(--text);padding:10px 22px;border-radius:99px;font-size:13px;font-weight:700;z-index:999;display:none;box-shadow:0 4px 20px rgba(0,0,0,.5);white-space:nowrap}
/* Colony scene */
.cw{background:var(--surface);border-radius:0;overflow:hidden}
.cs{position:relative;height:300px;background:linear-gradient(180deg,#020B1A 0%,#0A1628 40%,#162544 70%,#1E3352 100%);overflow:hidden}
.cs-stars{position:absolute;inset:0}
.cs-hud{position:absolute;top:12px;left:14px;right:14px;display:flex;justify-content:space-between;align-items:flex-start;z-index:5}
.cs-gnd{position:absolute;bottom:0;left:0;right:0;height:100px;background:linear-gradient(180deg,#1a2a3a 0%,#2d1f14 40%,#3d2a18 100%);border-top:1px solid #4a3520}
.cs-gnd::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#6b4c2a,#8b6b3a,#6b4c2a,transparent)}
.cs-mods{position:absolute;bottom:0;left:0;right:0;height:180px}
.cs-stat{flex:1;text-align:center;padding:10px 4px;background:var(--surface2);border-radius:10px}
.cs-stat-v{font-size:18px;font-weight:800}.cs-stat-l{font-size:10px;color:var(--text2);margin-top:2px}
@keyframes tw{0%,100%{opacity:.2}50%{opacity:1}}
@keyframes wf{0%,90%{opacity:.85}95%{opacity:.3}100%{opacity:.85}}
@keyframes sm{0%{transform:translateY(0);opacity:.4}100%{transform:translateY(-10px);opacity:0}}
@keyframes pu{0%,100%{opacity:.3}50%{opacity:.7}}
/* Themes */
.cs.t-mars{background:linear-gradient(180deg,#1a0505,#2d0a0a 40%,#4a1515 70%,#5a2020)}
.cs.t-buz{background:linear-gradient(180deg,#051520,#0a2540 40%,#154060 70%,#1a5070)}
.cs.t-orman{background:linear-gradient(180deg,#050f05,#0a200a 40%,#153a15 70%,#1a4a1a)}
.cs.t-nebula{background:linear-gradient(180deg,#100520,#200a3a 40%,#351560 70%,#451a80)}
.cs.t-altin{background:linear-gradient(180deg,#151005,#2a200a 40%,#403515 70%,#50451a)}
.cs.t-karanlik{background:linear-gradient(180deg,#020204,#050510 40%,#0a0a1a 70%,#101020)}
.t-mars .cs-gnd{background:linear-gradient(180deg,#3a1a1a,#5a2010 40%,#6a2a10);border-top-color:#7a3a20}
.t-mars .cs-gnd::before{background:linear-gradient(90deg,transparent,#8a4020,#aa5530,#8a4020,transparent)}
.t-buz .cs-gnd{background:linear-gradient(180deg,#1a3040,#1a4050 40%,#1a5060);border-top-color:#3a7090}
.t-buz .cs-gnd::before{background:linear-gradient(90deg,transparent,#4a8aaa,#5a9aba,#4a8aaa,transparent)}
.t-orman .cs-gnd{background:linear-gradient(180deg,#1a2a1a,#1a3a10 40%,#1a4a10);border-top-color:#3a6a20}
.t-orman .cs-gnd::before{background:linear-gradient(90deg,transparent,#4a7a2a,#5a8a3a,#4a7a2a,transparent)}
.t-nebula .cs-gnd{background:linear-gradient(180deg,#2a1a3a,#3a1a4a 40%,#4a2060);border-top-color:#6a3a8a}
.t-nebula .cs-gnd::before{background:linear-gradient(90deg,transparent,#7a4a9a,#8a5aaa,#7a4a9a,transparent)}
.t-altin .cs-gnd{background:linear-gradient(180deg,#2a2010,#3a3010 40%,#4a3a10);border-top-color:#6a5a20}
.t-altin .cs-gnd::before{background:linear-gradient(90deg,transparent,#8a7a2a,#aa9a3a,#8a7a2a,transparent)}
.t-karanlik .cs-gnd{background:linear-gradient(180deg,#0a0a10,#0a0a14 40%,#10101a);border-top-color:#1a1a2a}
.t-karanlik .cs-gnd::before{background:linear-gradient(90deg,transparent,#2a2a3a,#3a3a4a,#2a2a3a,transparent)}
@media(min-width:600px){.layout{border-left:1px solid var(--border);border-right:1px solid var(--border)}}
</style>
</head>
<body>
<div class="layout">
  <div class="hdr"><h1>🚀 <span>Koloni</span> Test</h1><div class="lvl-badge" id="hLvl">Sv. 1</div></div>
  <div id="preview"></div>
  <div class="tabs">
    <button class="tab on" onclick="showTab(0)">⚙️ Kontrol</button>
    <button class="tab" onclick="showTab(1)">🏗️ Modüller</button>
    <button class="tab" onclick="showTab(2)">📖 Hikaye</button>
    <button class="tab" onclick="showTab(3)">📈 XP</button>
    <button class="tab" onclick="showTab(4)">🎨 Tema</button>
  </div>
  <div class="pane on" id="p0">
    <div class="card"><div class="card-t">⚙️ Seviye & XP</div>
      <div class="row"><div class="lbl">Seviye <span class="val" id="vLvl">1</span></div><input type="range" min="1" max="50" value="1" id="sLvl" oninput="setLvl(+this.value)"></div>
      <div class="row"><div class="lbl">XP <span class="val" id="vXp">0</span></div><input type="range" min="0" max="26000" value="0" step="10" id="sXp" oninput="setXp(+this.value)"></div>
      <div class="row"><div class="lbl">Giriş Serisi <span class="val" id="vStr">0</span></div><input type="range" min="0" max="60" value="0" id="sStr" oninput="setStr(+this.value)"></div>
      <div class="tgl"><input type="checkbox" id="cHon" onchange="setHon(this.checked)"><label for="cHon">Dürüstlük Kalkanı</label></div>
    </div>
    <div class="card"><div class="card-t">📊 Durum</div><div id="statusInfo"></div></div>
    <div class="card"><div class="card-t">🔧 Simülasyonlar</div>
      <div class="btns" style="margin-bottom:6px"><button class="btn btn-p" onclick="simW()">+15 XP Wellness</button><button class="btn btn-s" onclick="simUp()">Seviye Atla</button></div>
      <div class="btns" style="margin-bottom:6px"><button class="btn btn-o" onclick="simQ(50)">50 Soru (+5 XP)</button><button class="btn btn-o" onclick="simE()">Deneme (+30 XP)</button></div>
      <div class="btns"><button class="btn btn-d" onclick="resetAll()">Sıfırla</button></div>
    </div>
  </div>
  <div class="pane" id="p1"><div class="card"><div class="card-t">🏗️ Modül Durumları</div><div id="modGrid" class="mg"></div></div></div>
  <div class="pane" id="p2"><div class="card"><div class="card-t">📖 Bölümler <span style="font-weight:400;color:var(--text2);font-size:11px;margin-left:4px" id="chCnt">0/50</span></div>
    <div class="tgl" style="margin-top:0;margin-bottom:10px"><input type="checkbox" id="chAll" onchange="renderCh()"><label for="chAll">Kilitli bölümleri göster</label></div>
    <div id="chList"></div></div>
  </div>
  <div class="pane" id="p3"><div class="card"><div class="card-t">📈 XP & Seviye Tablosu</div><div id="xpTbl" style="max-height:500px;overflow-y:auto"></div></div>
    <div class="card"><div class="card-t">🧮 Süre Hesaplama</div>
      <div class="row"><div class="lbl">Günlük ort. XP <span class="val" id="vDxp">15</span></div><input type="range" min="10" max="80" value="15" id="sDxp" oninput="calcDur()"></div>
      <div id="durRes" style="font-size:12px;color:var(--text2);margin-top:4px"></div>
    </div>
  </div>
  <div class="pane" id="p4"><div class="card"><div class="card-t">🎨 Koloni Teması</div><div class="tg" id="thGrid"></div></div>
    <div class="card"><div class="card-t">✏️ Koloni İsmi</div>
      <div style="display:flex;gap:6px"><input type="text" id="cName" value="Arcadia" placeholder="Koloni adı..." style="flex:1;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-family:'Nunito',sans-serif;outline:none"><button class="btn btn-p" onclick="setName()" style="flex:none;min-width:auto;padding:9px 16px">Uygula</button></div>
    </div>
  </div>
</div>
<div id="toast"></div>

const XPR={well:15,s3:10,s7:25,s14:50,s30:100,hon:20,q50:5,exam:30};

// ═══ ENGINE ═══
const SK='colony_test_v3';
let D,theme='';
function def(){return{xp:0,level:1,days:0,streak:0,last:null,hon:false,moods:[],name:'Arcadia'}}
function ld(){try{D=JSON.parse(localStorage.getItem(SK))||def()}catch(e){D=def()}}
function sv(){localStorage.setItem(SK,JSON.stringify(D))}
function gLvl(xp){let l=1;for(let i=LVLS.length-1;i>=0;i--)if(xp>=LVLS[i].xp){l=LVLS[i].l;break}return l}
function gInfo(l){return LVLS.find(v=>v.l===l)||LVLS[0]}
function gNext(l){const n=LVLS.find(v=>v.l===l+1);return n?n.xp:null}
function gProg(xp,l){const c=gInfo(l),nx=gNext(l);if(!nx)return{c:xp,n:xp,p:100};return{c:xp-c.xp,n:nx-c.xp,p:Math.min(100,Math.round((xp-c.xp)/(nx-c.xp)*100))}}
function gMod(id,l){const m=MODS.find(v=>v.id===id);if(!m)return{s:'?',u:0};if(l<m.ul)return{s:'locked',u:0,at:m.ul};let u=0;for(const a of m.ua)if(l>=a)u++;if(l===m.ul)return{s:'building',u,bp:68};return{s:'active',u}}
function gAct(l){return MODS.filter(m=>l>=m.ul)}
function gCh(l){return CHS.filter(c=>c.l<=l)}
function gNM(l){return MODS.find(m=>m.ul>l)||null}

// ═══ SCENE ═══
function buildScene(){
  const l=D.level,pr=gProg(D.xp,l),inf=gInfo(l),act=gAct(l),chs=gCh(l);
  const sT=D.streak>0?D.streak+' gün seri':'';
  const mH=buildMods(l);
  const tc=theme?` t-${theme}`:'';
  return `<div class="cw"><div class="cs${tc}" id="scene"><div class="cs-stars" id="stars"></div><div class="cs-hud"><div><div style="font-size:18px;font-weight:500;color:white;text-shadow:0 1px 8px rgba(0,0,0,.5)">Seviye ${l}</div><div style="font-size:10px;color:rgba(180,210,255,.6);margin-top:2px;letter-spacing:.5px">${(D.name||'ARCADIA').toUpperCase()} KOLONİSİ</div><div style="display:flex;gap:5px;margin-top:8px;flex-wrap:wrap">${sT?`<span style="font-size:10px;padding:3px 8px;border-radius:12px;background:rgba(29,158,117,.25);color:#5DCAA5;border:.5px solid rgba(93,202,165,.3)">${sT}</span>`:''} ${D.hon?'<span style="font-size:10px;padding:3px 8px;border-radius:12px;background:rgba(55,138,221,.2);color:#85B7EB;border:.5px solid rgba(133,183,235,.3)">dürüstlük kalkanı</span>':''}</div></div><div style="text-align:right"><div style="font-size:10px;color:rgba(255,255,255,.4)">Gün ${D.days||0}</div><div style="font-size:9px;color:rgba(255,255,255,.25);margin-top:2px">${inf.t}</div></div></div><div class="cs-gnd"></div><div class="cs-mods">${mH}</div></div><div style="display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface)"><span style="font-size:12px;font-weight:700;color:var(--text2);min-width:36px">Sv.${l}</span><div style="flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden"><div id="xpBar" style="height:100%;border-radius:3px;background:linear-gradient(90deg,#185FA5,#378ADD);width:0%;transition:width .8s ease"></div></div><span style="font-size:11px;color:var(--text2);min-width:80px;text-align:right">${pr.c}/${pr.n} XP</span></div><div style="display:flex;gap:6px;padding:12px 16px;background:var(--surface)"><div class="cs-stat"><div class="cs-stat-v">${D.streak||0}</div><div class="cs-stat-l">Giriş serisi</div></div><div class="cs-stat"><div class="cs-stat-v">${act.length}</div><div class="cs-stat-l">Aktif modül</div></div><div class="cs-stat"><div class="cs-stat-v">${chs.length}</div><div class="cs-stat-l">Bölüm</div></div><div class="cs-stat"><div class="cs-stat-v">${D.days||0}</div><div class="cs-stat-l">Toplam gün</div></div></div></div>`;
}
function buildMods(level){
  const P={komuta:{b:55,l:'50%',tf:'translateX(-50%)',w:70,h:48},yasam:{b:48,l:'calc(50% - 105px)',w:54,h:36},lab:{b:48,r:'calc(50% - 105px)',w:54,h:36},sera:{b:90,l:'calc(50% - 125px)',w:46,h:30},gozlem:{b:90,r:'calc(50% - 125px)',w:46,h:30},enerji:{b:44,l:'calc(50% - 160px)',w:34,h:24},iletisim:{b:44,r:'calc(50% - 160px)',w:34,h:24},akademi:{b:92,l:'50%',tf:'translateX(-50%)',w:50,h:28},kalkan:{b:120,l:'calc(50% - 80px)',w:30,h:20},portal:{b:120,r:'calc(50% - 80px)',w:30,h:20}};
  const C={komuta:{bg:'#1a3050',bd:'#3a6a9a',wn:'#7BC8FF'},yasam:{bg:'#0d3028',bd:'#2a7a5a',wn:'#5DCAA5'},lab:{bg:'#302810',bd:'#8a6a2a',wn:'#FAC775'},sera:{bg:'#1a3a20',bd:'#3a8a4a',wn:'#97C459'},gozlem:{bg:'#1a1a3a',bd:'#4a4a8a',wn:'#a5b4fc'},enerji:{bg:'#3a2a10',bd:'#8a6a20',wn:'#fde047'},iletisim:{bg:'#1a2a3a',bd:'#3a6a8a',wn:'#7dd3fc'},akademi:{bg:'#2a1a3a',bd:'#6a3a8a',wn:'#c4b5fd'},kalkan:{bg:'#1a3a3a',bd:'#3a8a8a',wn:'#67e8f9'},portal:{bg:'#2a1a2a',bd:'#8a3a8a',wn:'#f0abfc'}};
  let h='';
  MODS.forEach(mod=>{
    const p=P[mod.id];if(!p)return;const c=C[mod.id]||C.komuta;const st=gMod(mod.id,level);
    let s=`position:absolute;border-radius:6px;cursor:pointer;transition:.3s;width:${p.w}px;height:${p.h}px;bottom:${p.b}px;`;
    if(p.l)s+=`left:${p.l};`;if(p.r)s+=`right:${p.r};`;if(p.tf)s+=`transform:${p.tf};`;
    if(st.s==='locked'){if(mod.ul<=level+10){s+=`opacity:.15;border:1.5px dashed rgba(255,255,255,.2);background:transparent;`;h+=`<div style="${s}" title="${mod.name} — Sv${mod.ul}"><span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:8px;color:rgba(255,255,255,.2)">Sv.${mod.ul}</span><span style="position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);font-size:8px;color:rgba(255,255,255,.15);white-space:nowrap">${mod.name}</span></div>`}}
    else if(st.s==='building'){s+=`opacity:.5;border:1.5px dashed rgba(255,255,255,.5);background:${c.bg}66;`;h+=`<div style="${s}" title="${mod.name}"><span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:10px;color:rgba(255,255,255,.6);animation:pu 2s ease-in-out infinite">%${st.bp||68}</span><span style="position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);font-size:8px;color:rgba(255,255,255,.4);white-space:nowrap">${mod.name}</span></div>`}
    else{s+=`background:linear-gradient(180deg,${c.bg},${c.bg}dd);border:1px solid ${c.bd};`;let w='',wc=c.wn;
      if(p.w>=50){w+=`<div style="position:absolute;top:${Math.round(p.h*.2)}px;left:8px;width:5px;height:3px;background:${wc};border-radius:1px;animation:wf ${3+Math.random()*3}s infinite ${Math.random()*2}s"></div>`;w+=`<div style="position:absolute;top:${Math.round(p.h*.2)}px;right:8px;width:5px;height:3px;background:${wc};border-radius:1px;animation:wf ${3+Math.random()*3}s infinite ${Math.random()*2}s"></div>`}
      if(p.w>=60){w+=`<div style="position:absolute;top:${Math.round(p.h*.5)}px;left:14px;width:5px;height:3px;background:${wc};border-radius:1px;animation:wf ${4+Math.random()*2}s infinite ${Math.random()}s"></div>`;w+=`<div style="position:absolute;top:${Math.round(p.h*.5)}px;right:14px;width:5px;height:3px;background:${wc};border-radius:1px;animation:wf ${4+Math.random()*2}s infinite ${Math.random()*3}s"></div>`}
      let ex='';
      if(mod.id==='komuta')ex+=`<div style="position:absolute;top:-16px;left:50%;transform:translateX(-50%);width:1px;height:16px;background:rgba(255,255,255,.4)"><div style="position:absolute;top:-3px;left:-2px;width:5px;height:5px;border-radius:50%;background:#ff4444;animation:pu 1.5s ease-in-out infinite"></div></div>`;
      if(mod.id==='lab'){ex+=`<div style="position:absolute;top:-6px;right:8px;width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.2);animation:sm 3s ease-out infinite"></div>`;ex+=`<div style="position:absolute;top:-10px;right:12px;width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.15);animation:sm 3s ease-out infinite 1.5s"></div>`}
      h+=`<div style="${s}" title="${mod.name}">${w}${ex}<span style="position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);font-size:8px;color:rgba(255,255,255,.6);white-space:nowrap;font-weight:600">${mod.name}</span></div>`}
  });
  if(level>=2)h+=`<div style="position:absolute;bottom:63px;left:calc(50% - 52px);width:18px;height:2px;background:rgba(100,160,220,.3);border-radius:1px"></div>`;
  if(level>=4)h+=`<div style="position:absolute;bottom:63px;right:calc(50% - 52px);width:18px;height:2px;background:rgba(100,160,220,.3);border-radius:1px"></div>`;
  return h;
}
function initStars(){
  const el=document.getElementById('stars');if(!el)return;el.innerHTML='';
  for(let i=0;i<50;i++){const s=document.createElement('div');s.style.cssText=`position:absolute;border-radius:50%;background:white;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;left:${Math.random()*100}%;top:${Math.random()*55}%;animation:tw ${2+Math.random()*4}s ease-in-out infinite;animation-delay:${Math.random()*4}s`;el.appendChild(s)}
  const bar=document.getElementById('xpBar');if(bar){const pr=gProg(D.xp,D.level);setTimeout(()=>{bar.style.width=pr.p+'%'},100)}
}

// ═══ UI ═══
function refresh(){
  document.getElementById('preview').innerHTML=buildScene();setTimeout(initStars,50);
  document.getElementById('hLvl').textContent='Sv. '+D.level;
  document.getElementById('sLvl').value=D.level;document.getElementById('vLvl').textContent=D.level;
  document.getElementById('sXp').value=D.xp;document.getElementById('vXp').textContent=D.xp;
  document.getElementById('sStr').value=D.streak;document.getElementById('vStr').textContent=D.streak;
  document.getElementById('cHon').checked=D.hon;
  renderSt();renderMG();
}
function setLvl(v){const i=LVLS.find(x=>x.l===v);if(i)D.xp=i.xp;D.level=v;sv();refresh()}
function setXp(v){D.xp=v;D.level=gLvl(v);sv();refresh()}
function setStr(v){document.getElementById('vStr').textContent=v;D.streak=+v;sv();refresh()}
function setHon(v){D.hon=v;sv();refresh()}
function renderSt(){
  const l=D.level,pr=gProg(D.xp,l),inf=gInfo(l),act=gAct(l),chs=gCh(l),nm=gNM(l);
  let h='';
  h+=`<div class="info-r"><span class="l">Seviye</span><span class="v">${l} — "${inf.t}"</span></div>`;
  h+=`<div class="info-r"><span class="l">XP</span><span class="v">${D.xp} (${pr.c}/${pr.n} = %${pr.p})</span></div>`;
  h+=`<div class="info-r"><span class="l">Seri</span><span class="v">${D.streak} gün</span></div>`;
  h+=`<div class="info-r"><span class="l">Dürüstlük</span><span class="v">${D.hon?'✅':'❌'}</span></div>`;
  h+=`<div class="info-r"><span class="l">Modüller</span><span class="v">${act.length}/${MODS.length}</span></div>`;
  h+=`<div class="info-r"><span class="l">Bölümler</span><span class="v">${chs.length}/${CHS.length}</span></div>`;
  if(inf.u)h+=`<div class="info-r"><span class="l">Açılan</span><span class="v" style="color:var(--accent3)">${inf.u}</span></div>`;
  if(nm)h+=`<div class="info-r"><span class="l">Sonraki</span><span class="v">${nm.name} (Sv.${nm.ul})</span></div>`;
  document.getElementById('statusInfo').innerHTML=h;
}
function renderMG(){
  document.getElementById('modGrid').innerHTML=MODS.map(m=>{
    const s=gMod(m.id,D.level);const c=s.s==='active'?'act':s.s==='building'?'bld':'lck';
    const t=s.s==='active'?`✅ Aktif (Lv.${s.u})`:s.s==='building'?`🔨 İnşaat %${s.bp||68}`:`🔒 Kilitli (Sv.${s.at})`;
    return`<div class="mc ${c}"><div class="n">${m.name}</div><div class="s">${t}</div></div>`;
  }).join('');
}
function renderCh(){
  const all=document.getElementById('chAll').checked;const ul=gCh(D.level);const list=all?CHS:ul;
  document.getElementById('chCnt').textContent=ul.length+'/'+CHS.length;
  document.getElementById('chList').innerHTML=list.map(ch=>{
    const ok=ch.l<=D.level,inf=gInfo(ch.l);
    return`<div class="chi ${ok?'':'lk'}" onclick="const t=this.querySelector('.txt');t.style.maxHeight=t.style.maxHeight&&t.style.maxHeight!=='0px'?'0':'500px'"><div class="meta">Bölüm ${ch.l} — ${inf?.t||''} ${ok?'':'🔒'}</div><div class="tit">${ch.t}</div><div class="txt"><div class="txt-in">${ch.tx}${ch.h?'<div style="color:var(--accent);margin-top:6px;font-style:italic">→ '+ch.h+'</div>':''}</div></div></div>`;
  }).join('');
}
function renderXP(){
  let h='';LVLS.forEach(l=>{
    const ch=CHS.find(c=>c.l===l.l);
    h+=`<div class="xr ${l.l===D.level?'cur':''}"><div class="xl">Sv.${l.l}</div><div class="xi"><div class="xx">${l.xp} XP — "${l.t}"</div>${l.u?`<div class="xu">🔧 ${l.u}</div>`:''}${ch?`<div style="font-size:10px;color:var(--text2);margin-top:1px">📖 ${ch.t}</div>`:''}</div></div>`;
  });document.getElementById('xpTbl').innerHTML=h;
}
function calcDur(){
  const d=+document.getElementById('sDxp').value;document.getElementById('vDxp').textContent=d;
  const mx=LVLS[LVLS.length-1].xp,days=Math.ceil(mx/d);
  document.getElementById('durRes').innerHTML=`<strong>${days} gün</strong> (~${(days/30).toFixed(1)} ay)<br><span style="color:var(--text2)">Toplam ${mx} XP · Günlük ${d} XP</span>`;
}
function renderTh(){
  const ts=[{id:'',n:'Varsayılan',i:'🌌'},{id:'mars',n:'Mars',i:'🔴'},{id:'buz',n:'Buz',i:'❄️'},{id:'orman',n:'Orman',i:'🌲'},{id:'nebula',n:'Nebula',i:'🟣'},{id:'altin',n:'Altın',i:'✨'},{id:'karanlik',n:'Karanlık',i:'🌑'}];
  document.getElementById('thGrid').innerHTML=ts.map(t=>`<div class="tc ${theme===t.id?'on':''}" onclick="setTh('${t.id}')"><div style="font-size:18px;margin-bottom:3px">${t.i}</div>${t.n}</div>`).join('');
}
function setTh(id){theme=id;renderTh();refresh();toast('Tema: '+(id||'Varsayılan'))}
function setName(){const n=document.getElementById('cName').value.trim();if(!n)return;D.name=n;sv();refresh();toast('Koloni: '+n.toUpperCase())}

// Simulations
function simW(){
  const ms=['enerjik','sakin','kaygili','yorgun','kararli','heyecanli'];
  D.xp+=XPR.well;D.days++;D.streak++;if(!D.moods)D.moods=[];
  const m=ms[Math.floor(Math.random()*ms.length)];D.moods.push(m);if(D.moods.length>7)D.moods=D.moods.slice(-7);
  D.hon=new Set(D.moods.slice(-7)).size>=3;
  const o=D.level;D.level=gLvl(D.xp);sv();refresh();
  toast('+15 XP! '+m+(D.level>o?' 🚀 SEVİYE ATLADI!':''));
}
function simUp(){const n=LVLS.find(v=>v.l===D.level+1);if(!n){toast('Max seviye!');return}D.xp=n.xp;D.level=n.l;sv();refresh();toast('🚀 Seviye '+n.l+': '+n.t)}
function simQ(c){const xp=Math.floor(c/50)*XPR.q50;D.xp+=xp;D.level=gLvl(D.xp);sv();refresh();toast('+'+xp+' XP ('+c+' soru)')}
function simE(){D.xp+=XPR.exam;D.level=gLvl(D.xp);sv();refresh();toast('+'+XPR.exam+' XP (deneme)')}
function resetAll(){if(!confirm('Koloni test verilerini sıfırla?'))return;D=def();theme='';sv();refresh();renderTh();renderCh();renderXP();calcDur();toast('Sıfırlandı')}

// Tabs
function showTab(i){
  document.querySelectorAll('.pane').forEach((p,j)=>{p.classList.toggle('on',j===i)});
  document.querySelectorAll('.tab').forEach((t,j)=>{t.classList.toggle('on',j===i)});
  if(i===2)renderCh();if(i===3){renderXP();calcDur()}if(i===4)renderTh();
}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.display='block';clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',2200)}

// INIT
ld();document.getElementById('cName').value=D.name||'Arcadia';refresh();renderTh();
</script>
</body>
</html>
